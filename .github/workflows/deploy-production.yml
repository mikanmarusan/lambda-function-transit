name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "deploy" to confirm'
        required: true
      dry-run:
        description: 'Dry run mode'
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event.inputs.confirmation == 'deploy'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm test
      - name: Validate frontend
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm test

  build-frontend:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  deploy:
    needs: build-frontend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: aws-actions/setup-sam@v2
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ap-northeast-1

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: SAM Build
        run: sam build

      - name: Verify WEB_ACL_ARN_PROD secret matches live distribution
        run: |
          if [ -z "${{ secrets.WEB_ACL_ARN_PROD }}" ]; then
            echo "::error::WEB_ACL_ARN_PROD secret is not set on the production environment."
            exit 1
          fi
          # The actual risk is that the secret holds a stale or wrong ARN. CFN's
          # changeset Details for AWS::CloudFront::Distribution use Target.Name =
          # 'DistributionConfig' (the top-level property), not nested fields like
          # 'WebACLId', so we can't filter the changeset by WebACLId. Compare the
          # secret to the live distribution config instead.
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name transitmikanmarusan \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          LIVE_ARN=$(aws cloudfront get-distribution-config \
            --id "$DIST_ID" \
            --query 'DistributionConfig.WebACLId' \
            --output text)
          SECRET_ARN="${{ secrets.WEB_ACL_ARN_PROD }}"
          if [ "$LIVE_ARN" != "$SECRET_ARN" ]; then
            echo "::error::WEB_ACL_ARN_PROD does not match the live distribution's WebACLId. Update the secret before deploying."
            echo "Live: $LIVE_ARN"
            echo "Secret: <redacted, length=${#SECRET_ARN}>"
            exit 1
          fi
          echo "WebACLId secret matches live distribution."

      - name: SAM Deploy (dry-run plan)
        if: ${{ github.event.inputs.dry-run == 'true' }}
        run: |
          set -o pipefail
          sam deploy \
            --no-execute-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --parameter-overrides "WebACLArn=${{ secrets.WEB_ACL_ARN_PROD }}" \
            2>&1 | tee /tmp/sam-deploy-output.log

      - name: Describe pending changeset
        if: ${{ github.event.inputs.dry-run == 'true' }}
        run: |
          # Extract the changeset ARN that sam deploy --no-execute-changeset just printed.
          CHANGESET_ARN=$(grep -oE 'arn:aws:cloudformation:[^[:space:]]+:changeSet/[^[:space:]]+' /tmp/sam-deploy-output.log | tail -1)
          if [ -z "$CHANGESET_ARN" ]; then
            echo "::warning::No changeset was created. Either the template matches the live state exactly or sam output format changed."
            exit 0
          fi
          echo "Changeset ARN: $CHANGESET_ARN"
          aws cloudformation describe-change-set \
            --change-set-name "$CHANGESET_ARN" \
            --query 'Changes[].{Action:ResourceChange.Action,Type:ResourceChange.ResourceType,Logical:ResourceChange.LogicalResourceId,Replacement:ResourceChange.Replacement}' \
            --output table

          # Sanity gate: CloudFrontDistribution must be Modified in the changeset.
          # We don't filter by per-property Details because for AWS::CloudFront::Distribution
          # CFN reports Target.Name = 'DistributionConfig' at the top level, so a per-property
          # WebACLId filter always returns []. The Modify presence + the secret-vs-live check
          # above are the real gates.
          CF_CHANGE=$(aws cloudformation describe-change-set \
            --change-set-name "$CHANGESET_ARN" \
            --query 'Changes[?ResourceChange.LogicalResourceId==`CloudFrontDistribution`]' \
            --output json)
          if [ "$(echo "$CF_CHANGE" | jq 'length')" -eq 0 ]; then
            echo "::warning::Changeset does not include a CloudFrontDistribution change. If you intended to update CloudFront (e.g., template.yml changes), this is unexpected."
          else
            echo "CloudFrontDistribution change present in changeset."
          fi

      - name: SAM Deploy
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --parameter-overrides "WebACLArn=${{ secrets.WEB_ACL_ARN_PROD }}"

      - name: Get Stack Outputs
        if: ${{ github.event.inputs.dry-run != 'true' }}
        id: stack-outputs
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks --stack-name transitmikanmarusan --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" --output text)
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks --stack-name transitmikanmarusan --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" --output text)
          FRONTEND_URL=$(aws cloudformation describe-stacks --stack-name transitmikanmarusan --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" --output text)
          API_ENDPOINT=$(aws cloudformation describe-stacks --stack-name transitmikanmarusan --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" --output text)
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "distribution_id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT
          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "api_endpoint=$API_ENDPOINT" >> $GITHUB_OUTPUT

      - name: Sync frontend to S3
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.stack-outputs.outputs.bucket_name }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ steps.stack-outputs.outputs.bucket_name }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack-outputs.outputs.distribution_id }} \
            --paths "/*"

      - name: Health Check - API
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: |
          curl -f "${{ steps.stack-outputs.outputs.api_endpoint }}/api/status" || exit 1

      - name: Health Check - Frontend
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: |
          sleep 30  # Wait for CloudFront invalidation
          curl -f "${{ steps.stack-outputs.outputs.frontend_url }}" || exit 1
          curl -f "${{ steps.stack-outputs.outputs.frontend_url }}/api/status" || exit 1
          # Verify CloudFront SecurityHeadersPolicy applied to /api/* (PR #35)
          headers=$(curl -sI "${{ steps.stack-outputs.outputs.frontend_url }}/api/status")
          for h in 'strict-transport-security' 'x-content-type-options' 'x-frame-options'; do
            if ! echo "$headers" | grep -qi "^$h:"; then
              echo "::error::Security header $h missing from /api/status response"
              echo "$headers"
              exit 1
            fi
          done
