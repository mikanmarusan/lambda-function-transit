name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build development image
        run: docker build --target development -t transit-dev .
      - name: Build production image
        run: docker build --target production -t transit-prod .
      - name: Build frontend development image
        run: docker build --target development -t transit-frontend-dev ./frontend
      - name: Build frontend production image
        run: docker build --target builder -t transit-frontend-build ./frontend
      - name: Smoke test
        run: |
          docker run -d -p 8000:8000 --name dev-test transit-dev
          for _ in {1..30}; do
            if curl -sf http://localhost:8000/status; then break; fi
            sleep 1
          done
          curl -f http://localhost:8000/status || exit 1
          docker stop dev-test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - run: npm audit --audit-level=high
      - name: Frontend security check
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high

  validate-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/setup-sam@v3
        with:
          use-installer: true
      - run: sam validate --lint

  validate-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: actionlint
        # Third-party linter pinned to an immutable image tag (smaller surface than
        # adding a third-party Action). Bump deliberately; new versions add new rules.
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.1 -color
