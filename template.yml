# AWS SAM template for Transit application with CloudFront + S3 frontend
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Transit app with Lambda API and CloudFront + S3 frontend

Parameters:
  WebACLArn:
    Type: String
    Default: ''
    Description: |
      ARN of the WAFv2 Web ACL (Scope: CLOUDFRONT, region us-east-1) attached to the
      CloudFront distribution. Required in production where a CloudFront pricing-plan
      subscription mandates a Web ACL. Leave empty in non-prod stacks.
    AllowedPattern: '^$|^arn:aws:wafv2:us-east-1:\d{12}:global/webacl/[^/]+/[a-f0-9-]+$'
    ConstraintDescription: Must be empty or a WAFv2 CLOUDFRONT-scope Web ACL ARN in us-east-1.

Conditions:
  HasWebACL: !Not [!Equals [!Ref WebACLArn, '']]

Globals:
  Api:
    Cors:
      AllowOrigin: "'*'"
      AllowHeaders: "'Content-Type'"
      AllowMethods: "'GET,OPTIONS'"
    MethodSettings:
      - ResourcePath: '/*'
        HttpMethod: '*'
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50

Resources:
  # Lambda Function
  TransitFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src
      Description: Lambda Function of Roppongi-itchome To TsuTsujigaoka
      MemorySize: 128
      Timeout: 10
      Handler: index.handler
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      EphemeralStorage:
        Size: 512
      EventInvokeConfig:
        MaximumEventAgeInSeconds: 21600
        MaximumRetryAttempts: 2
      PackageType: Zip
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'
            - Effect: Allow
              Action:
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource:
                - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-TransitFunction-*:*'
      RecursiveLoop: Terminate
      SnapStart:
        ApplyOn: None
      Events:
        Transit:
          Type: Api
          Properties:
            Path: /api/transit
            Method: GET
        Status:
          Type: Api
          Properties:
            Path: /api/status
            Method: GET
      RuntimeManagementConfig:
        UpdateRuntimeOn: Auto

  # S3 Bucket for Frontend
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-frontend-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # S3 Bucket Policy for CloudFront OAC
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # CloudFront Origin Access Control
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        # PriceClass is locked by the CloudFront flat-rate pricing plan that mandates the
        # Web ACL (see WebACLId below). When the plan is active, any explicit PriceClass
        # override is rejected with "Distributions with the Free pricing plan can't have
        # the following features: Price class". We therefore omit PriceClass on stacks
        # that have the WebACL (= flat-rate plan), and keep PriceClass_200 elsewhere.
        PriceClass: !If [HasWebACL, !Ref AWS::NoValue, PriceClass_200]
        Comment: !Sub '${AWS::StackName} Frontend Distribution'
        WebACLId: !If [HasWebACL, !Ref WebACLArn, !Ref AWS::NoValue]

        Origins:
          # S3 Origin for static files
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''

          # API Gateway Origin
          - Id: ApiOrigin
            DomainName: !Sub '${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
            OriginPath: /Prod

        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03  # SecurityHeadersPolicy

        CacheBehaviors:
          # API routes
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
            ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03  # SecurityHeadersPolicy

        CustomErrorResponses:
          # SPA routing: redirect 404/403 to index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'
    Export:
      Name: !Sub '${AWS::StackName}-api-endpoint'

  TransitFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt TransitFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-lambda-arn'

  FrontendUrl:
    Description: CloudFront distribution URL for frontend
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-frontend-url'

  FrontendBucketName:
    Description: S3 bucket name for frontend assets
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub '${AWS::StackName}-frontend-bucket'

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub '${AWS::StackName}-cloudfront-id'
